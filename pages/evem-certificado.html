<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados EVEM 2026</title>
    
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/typography.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="background-color: #f8fafc;">
    
    <header class="top-bar">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="../index.html">🏠 Inicio</a></li>
                <li><a href="courses.html">💠 Volver a Cursos</a></li>
            </ul>
            <div class="central-logo-container">
                <a href="../index.html">
                    <img src="../assets/images/evem-logo.png" alt="EVEM Logo" class="central-logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="conferencias.html">👥 Conferencias</a></li>
                <li><a href="contact.html">💬 Inscripción</a></li>
            </ul>
        </div>
    </header>

    <div style="height: 40px;"></div>

    <section class="cert-search-section">
        <div class="container" style="max-width: 600px;">
            <div class="search-card">
                <div class="cert-icon-top" style="border-color: #1e3a8a; color: #1e3a8a;">🎓</div>
                <h1 style="color: #1e3a8a; font-size: 2.2rem; font-weight: 900; margin-bottom: 15px;">Certificados de Cursos</h1>
                <p style="color: #64748b; margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6;">Ingresa tu número de cédula. El sistema detectará automáticamente el curso que aprobaste y generará tu certificado avalado.</p>
                
                <form id="certForm" class="cert-form">
                    <input type="text" id="searchCedula" placeholder="Ej: V-12345678" required autocomplete="off">
                    <button type="submit" id="btnBuscar">
                        <span id="btnText">Validar y Generar PDF</span>
                    </button>
                </form>

                <div class="date-warning">
                    📅 <strong>Modo Pruebas Activado:</strong> Generación de certificados habilitada.
                </div>
            </div>
        </div>
    </section>

    <div id="qrCodeHidden" style="display: none;"></div>

    <script>
        document.getElementById('certForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cedula = document.getElementById('searchCedula').value.trim();
            const btn = document.getElementById('btnBuscar');
            const btnText = document.getElementById('btnText');
            
            // ⚠️ MODO DESARROLLADOR: Puesto en TRUE para que lo pruebes YA
            const FORZAR_DESCARGA_PARA_PRUEBAS = true;
            const unlockDate = new Date('2026-04-01T00:00:00'); 

            if (new Date() < unlockDate && !FORZAR_DESCARGA_PARA_PRUEBAS) {
                Swal.fire('Aún no disponible', 'Los certificados se habilitarán al finalizar el evento.', 'info');
                return;
            }

            btn.disabled = true;
            btnText.textContent = 'Buscando curso... ⏳';

            try {
                const response = await fetch(`../backend/api.php?action=check_evem_certificate&cedula=${encodeURIComponent(cedula)}`);
                const result = await response.json();

                if (response.ok) {
                    btnText.textContent = 'Generando Documento... 🖨️';
                    await generarPDF(result.fullName, cedula, result.course);
                    
                    Swal.fire({
                        title: '¡Certificado Generado!', 
                        text: `Tu certificado del curso "${result.course}" ha sido descargado.`, 
                        icon: 'success',
                        confirmButtonColor: '#1e3a8a'
                    });
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                Swal.fire('Aviso', error.message, 'warning');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Validar y Generar PDF';
            }
        });

        // ==========================================
        // MOTOR DE INYECCIÓN (EVEM - NOMBRE Y CURSO)
        // ==========================================
        async function generarPDF(nombre, cedula, curso) {
            const { jsPDF } = globalThis.jspdf;
            const pdf = new jsPDF('landscape', 'mm', 'a4'); 
            
            // 1. Cargar el placeholder de Canva
            const img = new Image();
            img.src = '../assets/images/plantilla-evem.jpg'; 
            
            await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = () => reject(new Error('No se encontró la imagen plantilla-evem.jpg'));
            });

            pdf.addImage(img, 'JPEG', 0, 0, 297, 210);

            const pageWidth = pdf.internal.pageSize.getWidth();

            // 2. Imprimir el Nombre del Participante
            pdf.setFont("times", "bolditalic");
            pdf.setTextColor(30, 58, 138); // Azul EVEM
            pdf.setFontSize(38); 
            let textWidth = pdf.getTextWidth(nombre);
            let textX = (pageWidth - textWidth) / 2;
            
            const alturaNombreY = 105; // Ajusta esta altura según tu placeholder
            pdf.text(nombre, textX, alturaNombreY);

            // 3. Imprimir el Nombre del Curso (Más pequeño y debajo)
            pdf.setFont("helvetica", "bold");
            pdf.setTextColor(71, 85, 105); // Color gris oscuro
            pdf.setFontSize(18); 
            const textoCurso = `"${curso}"`;
            textWidth = pdf.getTextWidth(textoCurso);
            textX = (pageWidth - textWidth) / 2;
            
            const alturaCursoY = 135; // Ajusta esta altura para que quede debajo del nombre
            pdf.text(textoCurso, textX, alturaCursoY);

            // 4. Generar el QR apuntando a validar-evem.html
            const qrContainer = document.getElementById('qrCodeHidden');
            qrContainer.innerHTML = '';

            const urlBase = globalThis.location.href.replace('evem-certificado.html', '');
            const enlaceReal = `${urlBase}validar-evem.html?id=${cedula}`;

            new QRCode(qrContainer, {
                text: enlaceReal,
                width: 256, height: 256, colorDark: "#1e3a8a", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H
            });

            await new Promise(r => setTimeout(r, 100)); 
            const qrCanvas = qrContainer.querySelector('canvas');
            if(qrCanvas) {
                const qrDataUrl = qrCanvas.toDataURL('image/png');
                
                // Usando las mismas coordenadas exactas de la esquina que perfeccionaste antes
                pdf.addImage(qrDataUrl, 'PNG', 18, 168, 28, 28);
            }

            // 5. Descargar PDF
            pdf.save(`Certificado_EVEM_${nombre.replaceAll(/\s+/g, '_')}.pdf`);
        }
    </script>

    <style>
        /* CSS SIMPLIFICADO AL MÁXIMO (Azul EVEM) */
        .cert-search-section { padding: 80px 0; background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); min-height: 60vh; display: flex; align-items: center; }
        .search-card { background: white; padding: 50px 40px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3); position: relative; }
        .cert-icon-top { font-size: 4rem; margin-top: -80px; margin-bottom: 20px; background: white; width: 100px; height: 100px; line-height: 100px; margin-left: auto; margin-right: auto; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 5px solid #f8fafc; }
        .cert-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .cert-form input { padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1.2rem; text-align: center; font-weight: 700; color: #1e3a8a; background: #f8fafc; transition: all 0.3s; }
        .cert-form input:focus { outline: none; border-color: #d4af37; background: white; }
        .cert-form button { background: linear-gradient(135deg, #1e3a8a, #172554); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3); border-bottom: 4px solid #172554; }
        .cert-form button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(30, 58, 138, 0.4); }
        .cert-form button:disabled { background: #94a3b8; cursor: not-allowed; border-bottom: none; transform: none; box-shadow: none; }
        .date-warning { background: #eff6ff; color: #1e3a8a; padding: 15px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #bfdbfe; }
    </style>
</body>
</html>
