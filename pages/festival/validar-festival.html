<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Certificado — Festival de las Ciencias CEDIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0284c7;
            --accent-light: #0ea5e9;
            --accent-pale: #e0f2fe;
            --accent-dark: #075985;
            --success: #059669;
            --success-pale: #d1fae5;
            --error: #dc2626;
            --error-pale: #fee2e2;
            --navy: #0f172a;
            --slate: #475569;
            --muted: #94a3b8;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ─── SCANNING ANIMATION ─── */
        .scan-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.4s ease both;
        }

        .scan-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent-pale);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .scan-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── MAIN CARD ─── */
        .verify-wrap {
            width: 100%;
            max-width: 560px;
            animation: riseIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ─── INSTITUTION BAR ─── */
        .institution-bar {
            background: var(--navy);
            border-radius: 16px 16px 0 0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .institution-bar .org {
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        .institution-bar .ref {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.28);
        }

        /* ─── DOCUMENT CARD ─── */
        .doc-card {
            background: white;
            border-radius: 0 0 20px 20px;
            border: 1px solid var(--border);
            border-top: none;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
        }

        /* ─── STATUS BAND ─── */
        .status-band {
            padding: 32px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-band.success { background: linear-gradient(135deg, #ecfdf5, #d1fae5); border-bottom: 1px solid #a7f3d0; }
        .status-band.error   { background: linear-gradient(135deg, #fff5f5, #fee2e2); border-bottom: 1px solid #fecaca; }

        .status-icon-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .status-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon.success {
            background: var(--success);
            box-shadow: 0 0 0 6px rgba(5,150,105,0.15);
            animation: popIn 0.4s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }

        .status-icon.error {
            background: var(--error);
            box-shadow: 0 0 0 6px rgba(220,38,38,0.15);
            animation: popIn 0.4s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .status-icon svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .seal-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px dashed;
            animation: rotateSlow 12s linear infinite;
        }

        .seal-ring.success { border-color: rgba(5,150,105,0.3); }
        .seal-ring.error   { border-color: rgba(220,38,38,0.3); }

        @keyframes rotateSlow { to { transform: rotate(360deg); } }

        .status-text h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .status-text p {
            font-size: 0.875rem;
            color: var(--slate);
            line-height: 1.5;
        }

        /* ─── CERT BODY ─── */
        .cert-body {
            padding: 32px 40px;
        }

        .cert-event-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-pale);
            color: var(--accent-dark);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 20px;
        }

        .cert-logo {
            height: 48px;
            margin-bottom: 20px;
            display: block;
        }

        /* ─── DATA ROWS ─── */
        .data-rows {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
        }

        .data-row {
            display: flex;
            align-items: flex-start;
            padding: 14px 18px;
            gap: 16px;
            animation: slideRow 0.4s ease both;
        }

        .data-row:nth-child(2) { animation-delay: 0.05s; }
        .data-row:nth-child(3) { animation-delay: 0.10s; }
        .data-row:nth-child(4) { animation-delay: 0.15s; }

        @keyframes slideRow {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .data-row:not(:last-child) { border-bottom: 1px solid var(--border); }
        .data-row:nth-child(even) { background: #fafbfd; }

        .data-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            min-width: 100px;
            padding-top: 2px;
            flex-shrink: 0;
        }

        .data-value {
            font-size: 0.925rem;
            font-weight: 600;
            color: var(--navy);
            line-height: 1.45;
        }

        .data-value.mono {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--accent);
        }

        /* ─── HASH / VERIFICACIÓN ─── */
        .verify-hash {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }

        .verify-hash .hash-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .verify-hash .hash-value {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--slate);
            word-break: break-all;
        }

        .verify-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(5,150,105,0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(5,150,105,0.2); }
            50%       { box-shadow: 0 0 0 6px rgba(5,150,105,0.1); }
        }

        /* ─── ACTION BTN ─── */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: white;
            box-shadow: 0 4px 16px rgba(2,132,199,0.25);
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(2,132,199,0.35);
        }

        .action-btn.secondary {
            background: #f1f5f9;
            color: var(--slate);
            border: 1px solid var(--border);
        }

        .action-btn.secondary:hover {
            background: var(--border);
        }

        /* ─── ERROR STATE ─── */
        .error-body {
            padding: 32px 40px;
            text-align: center;
        }

        .error-body h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .error-body p {
            color: var(--slate);
            font-size: 0.9rem;
            line-height: 1.65;
            margin-bottom: 12px;
        }

        .error-note {
            background: var(--error-pale);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.82rem;
            color: #7f1d1d;
            margin-bottom: 24px;
            text-align: left;
        }

        /* ─── FOOTER ─── */
        .verify-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.6;
        }

        /* ─── RESPONSIVE MÓVIL (CIRUGÍA PARA VALIDACIONES) ─── */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .verify-wrap {
                max-width: 100%;
            }

            /* 1. Cabecera y Status Band (Apilado elegante) */
            .institution-bar {
                padding: 12px 16px;
            }
            .institution-bar .org {
                font-size: 0.65rem; /* Evita que el nombre largo rompa la barra */
            }
            .status-band {
                padding: 24px 16px;
                flex-direction: column; /* Apilamos el check y el texto */
                text-align: center;
                gap: 16px;
            }
            .status-text h2 { font-size: 1.2rem; }
            .status-icon { width: 54px; height: 54px; }
            .status-icon svg { width: 24px; height: 24px; }

            /* 2. Cuerpo del certificado (Reducción de espacios) */
            .cert-body {
                padding: 24px 16px;
            }
            .cert-logo {
                height: 40px; /* Logo un poco más discreto en móvil */
            }

            /* 3. Filas de datos (Label arriba, Valor abajo para que no choquen) */
            .data-row {
                flex-direction: column; /* Pone el título arriba del texto */
                gap: 4px;
                padding: 12px 16px;
            }
            .data-label {
                min-width: auto;
                padding-top: 0;
                font-size: 0.65rem;
            }
            .data-value {
                font-size: 0.95rem;
            }

            /* 4. Caja de Hash / Verificación (Previene que el texto largo se salga) */
            .verify-hash {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                position: relative;
                padding: 14px 16px;
            }
            .verify-status-dot {
                position: absolute;
                top: 14px;
                right: 16px;
            }
            .verify-hash .hash-value {
                font-size: 0.65rem; /* Achica el código alfanumérico para que quepa */
            }

            /* 5. Pantalla de Errores */
            .error-body {
                padding: 24px 16px;
            }
        }
        /* ─── FOOTER RESTAURADO ─── */
        .footer {
            position: relative;
            margin-top: 72px;
            padding: 68px 0 38px;
            background:
                radial-gradient(circle at top left, rgba(56,189,248,0.14), transparent 32%),
                radial-gradient(circle at top right, rgba(7,89,133,0.28), transparent 28%),
                linear-gradient(180deg, #04111f 0%, #071827 100%);
            color: rgba(255,255,255,0.82);
            border-top: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 42px 42px;
            opacity: 0.32;
            pointer-events: none;
        }

        .footer-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 32px;
            margin-bottom: 28px;
        }

        .footer-col {
            min-width: 0;
        }

        .footer-col h4 {
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 18px;
        }

        .brand-col p,
        .footer-col p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.68);
            margin-bottom: 10px;
        }

        .footer-logo {
            display: block;
            width: 128px;
            max-width: 100%;
            margin-bottom: 18px;
            filter: brightness(0) invert(1);
            opacity: 0.95;
        }

        .footer-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 0;
        }

        .footer-links a {
            color: rgba(255,255,255,0.72);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .footer-links a:hover {
            color: #7dd3fc;
            transform: translateX(4px);
        }

        .footer-bottom {
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 22px;
            text-align: center;
        }

        .footer-bottom > p {
            margin: 0;
            color: rgba(255,255,255,0.68);
            line-height: 1.6;
        }

        .footer-bottom > div {
            margin-top: 16px !important;
        }

        .footer-bottom a {
            color: rgba(255,255,255,0.6) !important;
        }

        .footer-bottom a:hover {
            color: white !important;
        }

        @media (max-width: 640px) {
            .footer {
                margin-top: 56px;
                padding: 56px 0 32px;
            }

            .footer-container {
                padding: 0 15px;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .footer-col h4 {
                margin-bottom: 12px;
            }

            .footer-logo {
                width: 110px;
            }

            .footer-bottom {
                padding-top: 18px;
            }
        }
    </style>
</head>

                        <div class="data-rows">
                            <div class="data-row">
                                <span class="data-label">Equipo</span>
                                <span class="data-value">${team.team_name}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Institución</span>
                                <span class="data-value">${team.institution}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Área</span>
                                <span class="data-value">${team.area}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Evento</span>
                                <span class="data-value">Festival de las Ciencias · CEDIC UNET · Mayo 2025</span>
                            </div>
                        </div>
                        <div class="verify-hash">
                            <div>
                                <div class="hash-label">Hash de verificación</div>
                                <div class="hash-value">${hashSim}</div>
                            </div>
                            <div class="verify-status-dot"></div>
                        </div>
                        <a href="festival.html" class="action-btn primary">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
                            Ir al portal del Festival
                        </a>
                    </div>
                </div>
            `;
        }

        function buildError(mensaje) {
            return `
                <div class="institution-bar">
                    <span class="org">CEDIC · UNET — Verificación Oficial</span>
                    <span class="ref">ESTADO: INVÁLIDO</span>
                </div>
                <div class="doc-card">
                    <div class="status-band error">
                        <div class="status-icon-wrap">
                            <div class="status-icon error">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </div>
                            <div class="seal-ring error"></div>
                        </div>
                        <div class="status-text">
                            <h2>No se pudo verificar</h2>
                            <p>Este documento no fue encontrado en los registros oficiales.</p>
                        </div>
                    </div>
                    <div class="error-body">
                        <div class="error-note">⚠️ ${mensaje || 'Código QR inválido, dañado o el equipo no figura en la base de datos oficial.'}</div>
                        <p>Asegúrate de que el equipo esté solvente y aprobado por el comité del Festival.</p>
                        <a href="festival.html" class="action-btn secondary" style="margin-top:8px;">
                            Volver al portal del Festival
                        </a>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamName = urlParams.get('team');
            const scanEl = document.getElementById('scanScreen');
            const wrap = document.getElementById('resultWrap');
            const footer = document.getElementById('footerNote');

            await new Promise(r => setTimeout(r, 1200)); // deliberate scan delay

            scanEl.style.display = 'none';
            wrap.style.display = 'block';
            footer.style.display = 'block';

            if (teamName) {
                try {
                    const response = await fetch(`../../backend/api.php?action=check_festival_certificate&team=${encodeURIComponent(teamName)}`);
                    const data = await response.json();
                    if (response.ok) {
                        wrap.innerHTML = buildSuccess(data);
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    wrap.innerHTML = buildError(error.message);
                }
            } else {
                wrap.innerHTML = buildError('Código QR inválido o enlace dañado.');
            }
        });
    </script>
</body>
</html>
