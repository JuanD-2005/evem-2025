<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificado - DIM 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border-top: 8px solid #4c1d95; }
        .icon { font-size: 4.5rem; margin-bottom: 20px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        h1 { color: #1e293b; font-size: 1.6rem; margin-bottom: 10px; font-weight: 900; }
        p { color: #64748b; font-size: 1.05rem; line-height: 1.5; margin-bottom: 25px; }
        .data-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .data-box strong { display: block; color: #4c1d95; font-size: 1.3rem; margin-bottom: 8px; }
        .btn { display: inline-block; background: #4c1d95; color: white; padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.3s; }
        .btn:hover { background: #3b1673; transform: translateY(-2px); }
        .logo { width: 80px; margin-bottom: 15px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="card" id="resultCard">
        <div class="icon">⏳</div>
        <h1>Verificando...</h1>
        <p>Conectando con la base de datos oficial del evento.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(globalThis.location.search);

            // Detectamos qué tipo de QR estamos escaneando
            const cedula = urlParams.get('id');
            const equipo = urlParams.get('equipo');
            const nombre = urlParams.get('nombre');

            const card = document.getElementById('resultCard');

            // --- CASO 1: CERTIFICADO INDIVIDUAL (Tiene Cédula) ---
            if (cedula) {
                try {
                    const response = await fetch(`../backend/api.php?action=check_certificate&cedula=${encodeURIComponent(cedula)}`);
                    const data = await response.json();

                    if (response.ok) {
                        mostrarExito(data.fullName, `C.I: ${cedula}`, 'Día Internacional de las Matemáticas (DIM 2026)');
                    } else {
                        throw new Error(data.error || 'Certificado no encontrado en los registros.');
                    }
                } catch (error) {
                    mostrarError(error.message);
                }
            }
            // --- CASO 2: CERTIFICADO DE EQUIPOS (Tiene Equipo y Nombre) ---
            else if (equipo && nombre) {
                try {
                    // Consultamos si el equipo realmente existe en la base de datos
                    const response = await fetch(`../backend/api.php?action=get_dim_team&pseudonym=${encodeURIComponent(equipo)}`);

                    if (response.ok) {
                        mostrarExito(nombre, `Equipo: ${equipo}`, 'Trivia Matemática - DIM 2026');
                    } else {
                        throw new Error('El equipo referenciado no se encuentra registrado en la base de datos oficial.');
                    }
                } catch (error) {
                    mostrarError(error.message);
                }
            }
            // --- CASO 3: ENLACE ROTO O MANIPULADO ---
            else {
                mostrarError('Código QR inválido o enlace dañado.');
            }

            // Funciones auxiliares para no repetir código HTML
            function mostrarExito(nombrePrincipal, subtitulo, evento) {
                card.innerHTML = `
                    <img src="../assets/images/DiaPi.png" alt="DIM" class="logo" style="border-radius: 50%; width: 80px; height: 80px; object-fit: cover; border: 3px solid #e2e8f0;">
                    <div class="icon success">✅</div>
                    <h1>Documento Auténtico</h1>
                    <p>Este certificado es válido y está respaldado por la base de datos oficial.</p>
                    <div class="data-box">
                        <strong>${nombrePrincipal}</strong>
                        <span style="color: #475569; font-weight: bold;">${subtitulo}</span><br>
                        <span style="font-size: 0.9rem; color: #94a3b8; margin-top: 10px; display: block; border-top: 1px solid #e2e8f0; padding-top: 10px;">${evento}</span>
                    </div>
                    <a href="../index.html" class="btn">Ir al portal de EVEM</a>
                `;
            }

            function mostrarError(mensaje) {
                card.innerHTML = `
                    <div class="icon error">❌</div>
                    <h1>Certificado Inválido</h1>
                    <p>${mensaje}</p>
                    <p style="font-size: 0.85rem; color: #94a3b8;">Si crees que es un error, contacta al comité organizador.</p>
                `;
            }
        });
    </script>
</body>
</html>
