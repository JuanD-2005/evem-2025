<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Certificado — DIM 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6d28d9;
            --accent-light: #7c3aed;
            --accent-pale: #ede9fe;
            --accent-dark: #4c1d95;
            --success: #059669;
            --success-pale: #d1fae5;
            --error: #dc2626;
            --error-pale: #fee2e2;
            --navy: #0f172a;
            --slate: #475569;
            --muted: #94a3b8;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .scan-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.4s ease both;
        }

        .scan-ring {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent-pale);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .scan-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem; color: var(--muted);
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        @keyframes slideRow {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes rotateSlow { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 3px rgba(5,150,105,0.2); }
            50%      { box-shadow: 0 0 0 6px rgba(5,150,105,0.1); }
        }

        .verify-wrap {
            width: 100%; max-width: 560px;
            animation: riseIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .institution-bar {
            background: var(--accent-dark);
            border-radius: 16px 16px 0 0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .institution-bar .org {
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.55);
        }

        .institution-bar .ref {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; color: rgba(255,255,255,0.3);
        }

        .doc-card {
            background: white;
            border-radius: 0 0 20px 20px;
            border: 1px solid var(--border);
            border-top: none;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
        }

        .status-band {
            padding: 32px 40px;
            display: flex; align-items: center; gap: 20px;
        }

        .status-band.success { background: linear-gradient(135deg, #ecfdf5, #d1fae5); border-bottom: 1px solid #a7f3d0; }
        .status-band.error   { background: linear-gradient(135deg, #fff5f5, #fee2e2); border-bottom: 1px solid #fecaca; }

        .status-icon-wrap { position: relative; flex-shrink: 0; }

        .status-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .status-icon.success {
            background: var(--success);
            box-shadow: 0 0 0 6px rgba(5,150,105,0.15);
            animation: popIn 0.4s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }

        .status-icon.error {
            background: var(--error);
            box-shadow: 0 0 0 6px rgba(220,38,38,0.15);
            animation: popIn 0.4s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }

        .status-icon svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .seal-ring {
            position: absolute; inset: -8px;
            border-radius: 50%; border: 2px dashed;
            animation: rotateSlow 12s linear infinite;
        }

        .seal-ring.success { border-color: rgba(5,150,105,0.3); }
        .seal-ring.error   { border-color: rgba(220,38,38,0.3); }

        .status-text h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem; font-weight: 800; color: var(--navy);
            margin-bottom: 4px; letter-spacing: -0.01em;
        }

        .status-text p { font-size: 0.875rem; color: var(--slate); line-height: 1.5; }

        .cert-body { padding: 32px 40px; }

        .cert-event-label {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent-pale); color: var(--accent-dark);
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 4px 12px; border-radius: 999px; margin-bottom: 20px;
        }

        .cert-logo { height: 60px; margin-bottom: 20px; display: block; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); }

        .data-rows {
            display: flex; flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; margin-bottom: 28px;
        }

        .data-row {
            display: flex; align-items: flex-start;
            padding: 14px 18px; gap: 16px;
            animation: slideRow 0.4s ease both;
        }

        .data-row:nth-child(2) { animation-delay: 0.05s; }
        .data-row:nth-child(3) { animation-delay: 0.10s; }
        .data-row:nth-child(4) { animation-delay: 0.15s; }
        .data-row:not(:last-child) { border-bottom: 1px solid var(--border); }
        .data-row:nth-child(even) { background: #fafbfd; }

        .data-label {
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--muted); min-width: 100px; padding-top: 2px; flex-shrink: 0;
        }

        .data-value { font-size: 0.925rem; font-weight: 600; color: var(--navy); line-height: 1.45; }

        .data-value.mono {
            font-family: 'DM Mono', monospace; font-weight: 500;
            font-size: 0.875rem; color: var(--accent);
        }

        .verify-hash {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 24px;
        }

        .verify-hash .hash-label {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 2px;
        }

        .verify-hash .hash-value {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; color: var(--slate); word-break: break-all;
        }

        .verify-status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--success); flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        .action-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 10px;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
            text-decoration: none; transition: all 0.2s; letter-spacing: 0.01em;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--accent-dark), var(--accent-light));
            color: white;
            box-shadow: 0 4px 16px rgba(109,40,217,0.25);
        }

        .action-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(109,40,217,0.35); }

        .action-btn.secondary {
            background: #f1f5f9; color: var(--slate); border: 1px solid var(--border);
        }

        .action-btn.secondary:hover { background: var(--border); }

        .error-body { padding: 32px 40px; text-align: center; }
        .error-body h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
        .error-body p { color: var(--slate); font-size: 0.9rem; line-height: 1.65; margin-bottom: 12px; }
        .error-note { background: var(--error-pale); border-radius: 10px; padding: 12px 16px; font-size: 0.82rem; color: #7f1d1d; margin-bottom: 24px; text-align: left; }

        .verify-footer { margin-top: 20px; text-align: center; font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
    </style>
</head>
<body>

    <div id="scanScreen" class="scan-screen">
        <div class="scan-ring"></div>
        <span class="scan-label">Verificando autenticidad...</span>
    </div>

    <div id="resultWrap" class="verify-wrap" style="display:none;"></div>

    <p class="verify-footer" id="footerNote" style="display:none;">
        Portal de verificación oficial — DIM 2026 · EVEM · Universidad Nacional Experimental del Táchira<br>
        Consultas al comité organizador del evento.
    </p>

    <script>
        function hashSim(str) { return btoa(encodeURIComponent(str)).substring(0,32).toUpperCase(); }

        function buildSuccess(nombrePrincipal, subtitulo, evento, logoSrc) {
            const hash = hashSim(nombrePrincipal + subtitulo);
            return `
                <div class="institution-bar">
                    <span class="org">DIM 2026 · EVEM — Verificación Oficial</span>
                    <span class="ref">REF #${hash.substring(0,8)}</span>
                </div>
                <div class="doc-card">
                    <div class="status-band success">
                        <div class="status-icon-wrap">
                            <div class="status-icon success">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <div class="seal-ring success"></div>
                        </div>
                        <div class="status-text">
                            <h2>Certificado Auténtico</h2>
                            <p>Documento válido y registrado en la base de datos oficial del evento.</p>
                        </div>
                    </div>
                    <div class="cert-body">
                        <div class="cert-event-label">
                            <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
                            ${evento}
                        </div>
                        <img src="../assets/images/DiaPi.png" alt="DIM" class="cert-logo">
                        <div class="data-rows">
                            <div class="data-row">
                                <span class="data-label">Participante</span>
                                <span class="data-value">${nombrePrincipal}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Referencia</span>
                                <span class="data-value mono">${subtitulo}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Evento</span>
                                <span class="data-value">${evento}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Institución</span>
                                <span class="data-value">UNET · EVEM</span>
                            </div>
                        </div>
                        <div class="verify-hash">
                            <div>
                                <div class="hash-label">Hash de verificación</div>
                                <div class="hash-value">${hash}</div>
                            </div>
                            <div class="verify-status-dot"></div>
                        </div>
                        <a href="../index.html" class="action-btn primary">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
                            Ir al portal de EVEM
                        </a>
                    </div>
                </div>
            `;
        }

        function buildError(mensaje) {
            return `
                <div class="institution-bar">
                    <span class="org">DIM 2026 · EVEM — Verificación Oficial</span>
                    <span class="ref">ESTADO: INVÁLIDO</span>
                </div>
                <div class="doc-card">
                    <div class="status-band error">
                        <div class="status-icon-wrap">
                            <div class="status-icon error">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </div>
                            <div class="seal-ring error"></div>
                        </div>
                        <div class="status-text">
                            <h2>No se pudo verificar</h2>
                            <p>Este documento no fue encontrado en los registros oficiales.</p>
                        </div>
                    </div>
                    <div class="error-body">
                        <div class="error-note">⚠️ ${mensaje || 'Código QR inválido, dañado o el participante no figura en la base de datos oficial.'}</div>
                        <p>Si crees que es un error, contacta al comité organizador.</p>
                        <a href="../index.html" class="action-btn secondary" style="margin-top:8px;">
                            Volver al portal de EVEM
                        </a>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(globalThis.location.search);
            const cedula = urlParams.get('id');
            const equipo = urlParams.get('equipo');
            const nombre = urlParams.get('nombre');
            const scanEl = document.getElementById('scanScreen');
            const wrap = document.getElementById('resultWrap');
            const footer = document.getElementById('footerNote');

            await new Promise(r => setTimeout(r, 1200));

            scanEl.style.display = 'none';
            wrap.style.display = 'block';
            footer.style.display = 'block';

            if (cedula) {
                try {
                    const response = await fetch(`../backend/api.php?action=check_certificate&cedula=${encodeURIComponent(cedula)}`);
                    const data = await response.json();
                    if (response.ok) {
                        wrap.innerHTML = buildSuccess(data.fullName, `C.I: ${cedula}`, 'Día Internacional de las Matemáticas · DIM 2026');
                    } else {
                        throw new Error(data.error || 'Certificado no encontrado en los registros.');
                    }
                } catch (error) {
                    wrap.innerHTML = buildError(error.message);
                }
            } else if (equipo && nombre) {
                try {
                    const response = await fetch(`../backend/api.php?action=get_dim_team&pseudonym=${encodeURIComponent(equipo)}`);
                    if (response.ok) {
                        wrap.innerHTML = buildSuccess(nombre, `Equipo: ${equipo}`, 'Trivia Matemática · DIM 2026');
                    } else {
                        throw new Error('El equipo referenciado no se encuentra registrado en la base de datos oficial.');
                    }
                } catch (error) {
                    wrap.innerHTML = buildError(error.message);
                }
            } else {
                wrap.innerHTML = buildError('Código QR inválido o enlace dañado.');
            }
        });
    </script>
</body>
</html>
