<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados — Festival de las Ciencias CEDIC</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/typography.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Librerías para Alertas y PDFs -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(160deg, #0369a1 0%, #0c4a6e 40%, #082f49 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Fondo cuántico */
        .hero-pattern {
            position: absolute; inset: 0; z-index: -1;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .cert-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }

        .cert-card {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            color: #0f172a;
        }

        .cert-icon {
            font-size: 4rem;
            margin-top: -85px;
            margin-bottom: 20px;
            background: white;
            width: 110px; height: 110px;
            line-height: 110px;
            margin-left: auto; margin-right: auto;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 6px solid #f1f5f9;
        }

        .cert-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #0284c7;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
        }

        .cert-card p {
            color: #475569;
            margin-bottom: 30px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .cert-form { display: flex; flex-direction: column; gap: 15px; }
        
        .cert-form input {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            color: #0f172a;
            background: #f8fafc;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }

        .cert-form input:focus {
            outline: none; border-color: #0ea5e9; background: white;
            box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
        }

        .cert-form button {
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            color: white; border: none; padding: 18px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(14,165,233,0.3);
            font-family: 'DM Sans', sans-serif;
        }

        .cert-form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(14,165,233,0.4);
        }

        .placeholder-badge {
            background: #fef08a;
            color: #854d0e;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #fde047;
        }
    </style>
</head>
<body>

    <!-- Header con bloque blanco -->
    <header class="top-bar">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="festival.html">⬅️ Volver al Festival</a></li>
            </ul>
            
            <div class="central-logo-container">
                <a href="festival.html">
                    <img src="../assets/images/cedic-Sinfondo.png" alt="CEDIC Logo" class="central-logo" style="max-height: 55px; width: auto; object-fit: contain; margin-top: 5px;">
                </a>
            </div>
            
            <ul class="nav-links">
                <li><a href="festival-registro.html" style="color: rgba(255,255,255,0.8); font-weight: 500;">Inscripción</a></li>
            </ul>
        </div>
    </header>

    <div class="hero-pattern"></div>

    <div class="cert-container">
        <div class="cert-card">
            <div class="cert-icon">🎓</div>
            <div class="placeholder-badge">🛠️ Módulo en Fase de Pruebas</div>
            <h1>Certificados del Festival</h1>
            <p>Ingresa el nombre de tu equipo o tu cédula para generar una versión de prueba de tu certificado de participación.</p>
            
            <form id="placeholderCertForm" class="cert-form">
                <input type="text" id="searchData" placeholder="Ej: Equipo Einstein o V-12345678" required autocomplete="off">
                <button type="submit" id="btnDescargar">
                    Generar Certificado de Prueba 📄
                </button>
            </form>
            
            <div style="margin-top: 20px; font-size: 0.85rem; color: #94a3b8;">
                *El diseño final del certificado será cargado próximamente por el comité organizador.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('placeholderCertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('searchData').value.trim();
            
            Swal.fire({
                title: 'Generando Documento...',
                html: 'Preparando versión de prueba para <b>' + input + '</b>',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                // Simular un pequeño tiempo de carga para efecto realista
                await new Promise(r => setTimeout(r, 1500));

                const { jsPDF } = globalThis.jspdf;
                const pdf = new jsPDF('landscape', 'mm', 'a4'); 

                // Dibujar un fondo de prueba (Azul claro)
                pdf.setFillColor(240, 249, 255);
                pdf.rect(0, 0, 297, 210, 'F');

                // Bordes decorativos
                pdf.setDrawColor(14, 165, 233);
                pdf.setLineWidth(3);
                pdf.rect(10, 10, 277, 190);

                // Textos del certificado placeholder
                pdf.setFont("helvetica", "bold");
                pdf.setTextColor(3, 105, 161);
                pdf.setFontSize(28);
                pdf.text("CERTIFICADO DE PARTICIPACIÓN", 148.5, 50, { align: "center" });
                
                pdf.setFontSize(16);
                pdf.setTextColor(71, 85, 105);
                pdf.text("VERSIÓN DE PRUEBA - DISEÑO PENDIENTE", 148.5, 65, { align: "center" });

                pdf.setFontSize(14);
                pdf.text("Se otorga el presente reconocimiento a:", 148.5, 90, { align: "center" });

                // Nombre ingresado
                pdf.setFont("helvetica", "bolditalic");
                pdf.setFontSize(36);
                pdf.setTextColor(15, 23, 42);
                pdf.text(input, 148.5, 115, { align: "center" });

                pdf.setFont("helvetica", "normal");
                pdf.setFontSize(14);
                pdf.setTextColor(71, 85, 105);
                pdf.text("Por su valiosa participación en el Festival de las Ciencias 2025.", 148.5, 140, { align: "center" });
                pdf.text("Centro de Enseñanza y Divulgación de las Ciencias (CEDIC)", 148.5, 150, { align: "center" });

                pdf.save(`Certificado_Prueba_${input.replaceAll(/\s+/g, '_')}.pdf`);
                
                Swal.fire({
                    title: '¡Descarga Exitosa!',
                    text: 'El certificado de prueba ha sido generado.',
                    icon: 'success',
                    confirmButtonColor: '#0ea5e9'
                });

            } catch (error) {
                Swal.fire('Error', 'Hubo un problema al generar el PDF de prueba.', 'error');
            }
        });
    </script>
</body>
</html>
